{% extends 'base.html' %}
{% block title %}Удалить объявление{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-12 col-md-6 col-lg-5">
        <div class="card border-0 shadow rounded-4 text-center p-4 p-md-5 fade-in-up">
            <i class="bi bi-exclamation-triangle-fill display-3 text-danger mb-3"></i>
            <h4 class="fw-bold mb-2">Удалить объявление?</h4>
            <p class="text-muted mb-4">«{{ ad.title }}» будет удалено безвозвратно.</p>
            <form method="post" class="d-flex gap-3 justify-content-center">
                {% csrf_token %}
                <a href="{% url 'ad_detail' ad.uuid %}" class="btn btn-light btn-lg px-4 rounded-pill">Отмена</a>
                <button type="submit" class="btn btn-danger btn-lg px-4 rounded-pill">
                    <i class="bi bi-trash me-1"></i>Удалить
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
